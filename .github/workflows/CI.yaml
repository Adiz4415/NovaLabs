name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: contracts # all cargo commands run in contracts/

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_TOOLCHAIN: stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_TOOLCHAIN: stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('''contracts/Cargo.lock''') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_TOOLCHAIN: stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('''contracts/Cargo.lock''') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test --all --verbose

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        env:
          RUSTUP_TOOLCHAIN: stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('''contracts/Cargo.lock''') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-
      - name: Build all crates
        run: cargo build --all --verbose

  # ─────────────────────────────────────────────
  # SEMGREP — Reentrancy guard enforcement
  # ─────────────────────────────────────────────
  semgrep:
    name: Semgrep (Reentrancy Guard)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep reentrancy rules
        # Fails the build only when guard violations are found (semgrep exits 1
        # with --error). Other exit codes (e.g. benign version warnings) are
        # tolerated so the job does not fail spuriously.
        run: |
          set +e
          semgrep scan --config .semgrep/reentrancy.yml --error --quiet
          code=$?
          if [ "$code" -eq 1 ]; then
            echo "::error::Reentrancy guard violations detected — see findings above."
            exit 1
          fi
          echo "semgrep: no reentrancy guard violations (exit $code)."
        env:
          SEMGREP_RULES: .semgrep/reentrancy.yml
          SEMGREP_APP_TOKEN: ""
          SEMGREP_REPO_NAME: novalabs


  # ─────────────────────────────────────────────
  # BACKEND — NestJS
  # ─────────────────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript check)
        run: npm run build

      - name: Unit tests
        run: npm run test -- --passWithNoTests

  # ─────────────────────────────────────────────
  # FRONTEND — Next.js
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
