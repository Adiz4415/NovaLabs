name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily historical scan at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks (detect committed secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so the scheduled scan can inspect past commits.
          fetch-depth: 0

      - name: Run gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_CONFIG: .gitleaks.toml
        # The action fails the job (blocking the merge / push) when it finds
        # high-entropy or known-pattern secrets. On PR/push it scans the
        # changed range; on the scheduled run it scans all history.
