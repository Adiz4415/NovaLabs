name: Stryker weekly

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  stryker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run Stryker
        working-directory: backend
        run: npm run test:mutation --silent

      - name: Compute mutation score
        id: compute
        run: |
          REPORT=backend/reports/mutation/mutation.json
          if [ ! -f "$REPORT" ]; then
            echo "score=ERROR" >> $GITHUB_OUTPUT
            exit 0
          fi
          TOTAL=$(jq '[.files[] | .mutants[]] | length' $REPORT)
          NOCOVERAGE=$(jq '[.files[] | .mutants[] | select(.status=="NoCoverage")] | length' $REPORT)
          KILLED=$(jq '[.files[] | .mutants[] | select(.status=="Killed")] | length' $REPORT)
          CONSIDERED=$((TOTAL - NOCOVERAGE))
          if [ "$CONSIDERED" -le 0 ]; then
            echo "score=0" >> $GITHUB_OUTPUT
          else
            PERCENT=$(awk "BEGIN { printf \"%.2f\", (${KILLED} / ${CONSIDERED}) * 100 }")
            echo "score=$PERCENT" >> $GITHUB_OUTPUT
          fi

      - name: Post comment to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const score = "${{ steps.compute.outputs.score }}";
            const body = score === 'ERROR'
              ? `Stryker run failed or no report generated. Check the workflow logs.`
              : `Weekly Stryker mutation score for \`backend/src/auth\` is **${score}%**. Report: /backend/reports/mutation/mutation.html`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 146,
              body,
            });
